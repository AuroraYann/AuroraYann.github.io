<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统操作员@ls-Super-Server :: 个人加密日志</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* 保持原有的黑客风格 CSS 完全不变 */
        :root { --bg-color: #0c0c0c; --main-green: #00ff41; --dim-green: #008f11; --accent-cyan: #00bcd4; --hover-bg: #1a1a1a; --font-stack: 'Fira Code', 'Courier New', Courier, monospace; }
        body, html { background-color: var(--bg-color); color: var(--main-green); font-family: var(--font-stack); margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        #terminal { width: 90%; max-width: 900px; height: 85vh; padding: 20px; border: 1px solid var(--dim-green); box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); overflow-y: auto; position: relative; }
        #terminal::-webkit-scrollbar { width: 8px; } #terminal::-webkit-scrollbar-track { background: var(--bg-color); border-left: 1px solid var(--dim-green); } #terminal::-webkit-scrollbar-thumb { background: var(--dim-green); } #terminal::-webkit-scrollbar-thumb:hover { background: var(--main-green); }
        .status-bar { color: var(--dim-green); font-size: 0.8rem; border-bottom: 1px dashed var(--dim-green); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .section-title { color: var(--main-green); font-weight: bold; margin-top: 10px; margin-bottom: 15px; border-left: 3px solid var(--main-green); padding-left: 10px; }
        
        .calendar-wrapper { border: 1px dashed var(--dim-green); padding: 15px; background: rgba(0, 143, 17, 0.02); }
        .calendar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed var(--dim-green); }
        .control-btn { background: none; border: 1px solid var(--dim-green); color: var(--main-green); padding: 5px 10px; cursor: pointer; font-family: var(--font-stack); font-weight: bold; transition: all 0.2s ease; }
        .control-btn:hover { background: var(--main-green); color: var(--bg-color); }
        .current-date-display { font-size: 1.2rem; font-weight: bold; color: var(--accent-cyan); letter-spacing: 2px; }
        .week-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: var(--dim-green); margin-bottom: 10px; padding-bottom: 5px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-day { border: 1px solid var(--hover-bg); min-height: 80px; padding: 5px; position: relative; color: var(--dim-green); transition: all 0.3s ease; background-color: rgba(255, 255, 255, 0.01); }
        .calendar-day:not(.empty):hover { border-color: var(--main-green); background-color: rgba(0, 255, 65, 0.05); }
        .calendar-day.empty { border: 1px dashed transparent; background: transparent; }
        .day-number { font-size: 0.9em; margin-bottom: 8px; font-weight: bold; }

        .event-label { display: inline-block; color: var(--bg-color); padding: 2px 6px; font-size: 0.8em; font-weight: bold; border-radius: 2px; cursor: pointer; width: 100%; box-sizing: border-box; text-align: center; margin-bottom: 3px; }
        .event-label.meeting { background-color: #ff9800; } .event-label.experiment { background-color: #8bc34a; } .event-label.outing { background-color: var(--accent-cyan); } .event-label.life { background-color: #e91e63; }
        .event-details { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); width: 260px; background-color: var(--bg-color); border: 1px solid var(--main-green); box-shadow: 0 0 20px rgba(0, 255, 65, 0.4); padding: 12px; z-index: 100; opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .calendar-day.has-event:hover .event-details { opacity: 1; visibility: visible; }
        .event-details img { width: 100%; height: auto; border: 1px solid var(--dim-green); margin-bottom: 10px; filter: grayscale(30%); }
        .event-details p { color: var(--main-green); font-size: 0.85em; margin: 0; line-height: 1.4; white-space: normal; }
        
        .calendar-grid .calendar-day:nth-child(7n+1) .event-details, .calendar-grid .calendar-day:nth-child(7n+2) .event-details { left: 0; transform: translateX(0); }
        .calendar-grid .calendar-day:nth-child(7n+6) .event-details, .calendar-grid .calendar-day:nth-child(7n) .event-details { left: auto; right: 0; transform: translateX(0); }
        .nav-back { display: inline-block; margin-top: 40px; color: var(--dim-green); text-decoration: none; border: 1px solid var(--dim-green); padding: 5px 15px; } .nav-back:hover { border-color: var(--main-green); color: var(--main-green); }

        /* 新增：终端密码拦截墙样式 */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); 
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: var(--main-green); font-family: var(--font-stack);
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div style="width: 80%; max-width: 600px; border: 1px solid var(--main-green); padding: 30px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); background-color: #050505;">
            <p style="margin: 0 0 10px 0;">> 警告 (WARNING): 该区域为高度机密 (TOP_SECRET)。</p>
            <p style="margin: 0 0 20px 0;">> 正在请求访问: 个人加密日志区_</p>
            <div style="display: flex; align-items: center;">
                <span style="margin-right: 10px;">> 请输入授权密钥 (Password):</span>
                <input type="password" id="pwd-input" style="background: transparent; border: none; border-bottom: 1px solid var(--dim-green); color: var(--main-green); font-family: var(--font-stack); font-size: 1rem; outline: none; width: 150px; letter-spacing: 3px;" autofocus>
            </div>
            <p id="error-msg" style="color: #e91e63; margin-top: 15px; visibility: hidden;">> 错误 (ERROR): 解密失败，密钥无效或数据已损坏。</p>
        </div>
    </div>

    <div id="terminal">
        <div class="status-bar">
            <span>[系统操作员@ls-Super-Server] :: 模块: PERSONAL_DIARY_ENCRYPTED</span>
            <a href="index.html" style="color: var(--dim-green); text-decoration: none;">[返回主控台]</a>
        </div>
        <p style="color: var(--dim-green);">> 验证通过。成功解密个人日记数据区...</p>

        <div class="section-title">> 核心时间轴 (Timeline)</div>
        <div class="calendar-wrapper">
            <div class="calendar-controls">
                <div>
                    <button class="control-btn" id="prevYear"><< 上一年</button>
                    <button class="control-btn" id="prevMonth">< 上个月</button>
                </div>
                <div class="current-date-display" id="monthYearDisplay">YYYY.MM</div>
                <div>
                    <button class="control-btn" id="nextMonth">下个月 ></button>
                    <button class="control-btn" id="nextYear">下一年 >></button>
                </div>
            </div>
            <div class="week-header"><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div><div>SUN</div></div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <a href="index.html" class="nav-back"><< 返回上一级目录 (cd ..)</a>
        <p style="color: var(--dim-green); margin-top: 30px;">> 记录完毕。系统待机中_</p>
    </div>

    <script>
        // =========================================================================
        // 【绝对机密区】将 e 生成的的密文粘贴
        // =========================================================================
        const ENCRYPTED_DATA = "U2FsdGVkX18HSFj/rC4dkmmaWYgHAQ+x9IMqvYZ5Bjm/amel0RQ6pSs5co8CssZIH/lzxfcqlnKcr+VOBU7D7VyhDedtk14bCvDu8ODa8+FI6mPeX5Sdu7rYq/Ro1JoIR+Q8F0DRh7Oo8e7cOO+rSTkNXiQZC9X1BMS1PUfKGSnYIJzjdC17gR1sV+9H1N7hPWN+gb/OnYNl91ZDC6LgF9S7SsUwwE3TKs3o/fX6ciJoY+CQ9oJSjqTfCu1q/dZFPIZZwT2L0rylezIqkIB7g6BLwPUtH9zhTYT3oi4hKM+HiXq0CmR7QZ3cHFhHmb6fKWzElSfvx4wFRMLC+d0Fw4zL+4f7+LGjuUicX1wE9VI57wdlKuHzbJVd4uchfSrqI0oH35lNehFelPQ26wgwPOr6Eu2HOaiSbj3zgW8zCeWSt7CHD2hQ2YaKwn7seBMwbd9uf+73U4FwVpp/5ACqYDLRh8Vt3NjhgpU2XUy2Bp/bf2NPuPtZKJVB6wH/4Ub3B+0eGH31fj9jVZhzxOF5rM45UFO545sIoyMbXvY7ZPKPrqOaqP8li7aKRGj/Qv8CkVWz7vcTzoYMS2TM5MM97YrEKrTP0OOfn9Rx1zejWtlOl8t+tvnwNMtdtVOeQBbdCcXy+Ewg6Ybr3LAJOZnuiXSJU5MtMbtdKXZI0/rK2rF0L4g0nFeQUaBmoba3B8mW0bK2LhwBAYsidIJJnRD++pUmjCrFBCysmfRXfjXWBHEXG/dDvIXuljk0+FwkEVbLNVuyCoQCg8FlBb9SCABEUkzan+6xHkzg9fABFzTtk6+C9NjLD27l9DEBvhwJwdN54ucGfVfugVFT0DPUmTE+5Ijdq1Oa88W4lSaGwAziKbN09kxxARpJkfyliRVfwB6S5yWfAqd2EXGHHA8lAGscnvLSwzME0LsXwCvRyKMXNqWaFLOsnbrgqbbhYIi9loaBd1AxjKaz0DKCRE1MXMfAuJsphqy2BoUrZuFCXroU0JoAPvpP3fNjuqbPaDni/qRJ3/jT04bqYsrTXOdpTrzFsxE9pR7y71uW3niq7OdrUN9A6h1WKXs5hZumiYB5IQTE/nAWlks2W+YeS0MREoEsYk7eoALvMPmV/W1ot3w07E1CRoLrJ5auSC9yx5brFUNkEvq/UVrSb6sRDtR7yaLm9bq6w9JRiFBZznBepGdWSNYyFujcosq+lPW7pi3Fam/M5Z99J9JFeqw5wVJjzfMNKXmzC/4+x4N4hwqE+XpAnrowSQ+j2PdCwidXLvccBHm/xMmkS1cEI4ukSZ1UITorhg=="; 
        const lockScreen = document.getElementById('lock-screen');
        const pwdInput = document.getElementById('pwd-input');
        const errorMsg = document.getElementById('error-msg');
        const grid = document.getElementById('calendarGrid');
        const display = document.getElementById('monthYearDisplay');

        let currentDate = new Date(); 
        let currentDatabase = {}; // 全局变量，存放成功解密后的数据

        // 监听密码输入
        pwdInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const pwd = pwdInput.value;
                try {
                    // 1. 发起 AES 强制解密
                    const bytes = CryptoJS.AES.decrypt(ENCRYPTED_DATA, pwd);
                    const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);

                    // 2. 如果密码错了，解出来的字符串是空的或者乱码，这步检查会抛出异常跳入 catch！
                    if (!decryptedStr) throw new Error("解密为空"); 
                    currentDatabase = JSON.parse(decryptedStr); 

                    // 3. 解密成功，撤除门禁
                    console.log('> 授权通过，系统解密成功_');
                    lockScreen.style.transition = 'opacity 0.5s ease';
                    lockScreen.style.opacity = '0';
                    setTimeout(() => { lockScreen.style.display = 'none'; }, 500);

                    // 4. 将解密出的真实数据注入日历并渲染
                    renderCalendar(currentDate, currentDatabase);

                } catch (error) {
                    // 密码错误处理
                    console.log('> 警报：解密失败，非法访问！');
                    errorMsg.style.visibility = 'visible';
                    pwdInput.value = '';
                    setTimeout(() => { errorMsg.style.visibility = 'hidden'; }, 1500);
                }
            }
        });

        // 渲染引擎 (底层渲染逻辑不变，新增了 database 参数接收解密数据)
        function renderCalendar(date, database) {
            const year = date.getFullYear();
            const month = date.getMonth(); 
            display.innerText = `${year}.${String(month + 1).padStart(2, '0')}`;
            grid.innerHTML = ''; 

            let firstDay = new Date(year, month, 1).getDay();
            firstDay = firstDay === 0 ? 6 : firstDay - 1; 
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) { grid.innerHTML += `<div class="calendar-day empty"></div>`; }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const event = database[dateString]; 

                if (event) {
                    grid.innerHTML += `
                        <div class="calendar-day has-event">
                            <div class="day-number">${String(day).padStart(2, '0')}</div>
                            <div class="event-label ${event.type}">${event.label}</div>
                            <div class="event-details">
                                <img src="${event.img}" alt="日志配图">
                                <p><strong>${event.title}</strong><br>${event.desc}</p>
                            </div>
                        </div>`;
                } else {
                    grid.innerHTML += `<div class="calendar-day"><div class="day-number">${String(day).padStart(2, '0')}</div></div>`;
                }
            }
        }

        // 按钮监听 (带入解密后的 currentDatabase)
        document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(currentDate, currentDatabase); });
        document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(currentDate, currentDatabase); });
        document.getElementById('prevYear').addEventListener('click', () => { currentDate.setFullYear(currentDate.getFullYear() - 1); renderCalendar(currentDate, currentDatabase); });
        document.getElementById('nextYear').addEventListener('click', () => { currentDate.setFullYear(currentDate.getFullYear() + 1); renderCalendar(currentDate, currentDatabase); });

        // 系统启动时，只渲染一个没有任何数据的空日历作为底层背景
        renderCalendar(currentDate, {});
    </script>
</body>
</html>
